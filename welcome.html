<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/6a9d5687c9.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/welcome.css">
    <link rel="shortcut icon" href="./multimedia/image/imgi_1_myjumia-top-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>Jumia</title>
</head>
<body>
    <div class="jumia">
        <div class="img">
            <img src="./multimedia/image/imgi_1_myjumia-top-logo.png" alt="">
        </div>
        <h1>Welcome to Jumia</h1>
        <p>Use your email or phone to log in or sign up.</p>
        <label for="Email or Mobile Number"></label>
        <input type="text" placeholder="Email or Mobile Number*">
        <button style="margin-top: 70px;">Continue</button>
        <div class="jumia-txt">
            <p>_________________  <span>or log in with</span> _______________________</p>
        </div>

        <div class="jumia-img">
            <a href="#"><img src="./multimedia/image/imgi_2_facebook.svg" alt=""></a>
            <a href="#"><img src="./multimedia/image/imgi_3_google.svg" alt=""></a>
        </div>

        <div class="terms">
            <h3>By continuing you agree to Jumia’s</h3>
            <ul>
                <li><a href="#">Terms and Conditions</a></li>
                <li><a href="#">Privacy Policy</a></li>
            </ul>
        </div>

        <div class="foot">
            <h3>Need help? Visit our Help Center or contact us on 02018881106</h3>

            <img src="./multimedia/image/imgi_4_myjumia-bottom-logo.png" alt="">
        </div>
    </div>
</body>
</html>
